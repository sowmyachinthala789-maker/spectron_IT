<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="100%" height="100%">
  <defs>
    <!-- Blue Crystal Gradients -->
    <linearGradient id="blue-crystal-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
    <linearGradient id="blue-crystal-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="50%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#6FB1FC" />
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Metallic Silver Gradients -->
    <linearGradient id="silver-metal-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#E2E8F0" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="75%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="silver-metal-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="35%" stop-color="#CBD5E1" />
      <stop offset="70%" stop-color="#64748B" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <!-- Text Silver Metallic Gradient -->
    <linearGradient id="text-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#E2E8F0" />
      <stop offset="70%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Drop Shadows for 3D depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group containing Logo Mark (Shield & Q) -->
  <g transform="translate(10, 5)" filter="url(#shadow)">
    <!-- 1. Silver Shield Outer Rim (Right curve) -->
    <path d="M 70 15 
             C 95 15, 115 35, 115 65 
             C 115 95, 95 115, 70 125
             C 65 120, 60 115, 55 110
             C 75 102, 92 85, 92 65
             C 92 45, 78 28, 55 20
             C 60 18, 65 16, 70 15 Z" 
          fill="url(#silver-metal-1)" />

    <!-- 2. Silver Shield Inner Border (Bottom support) -->
    <path d="M 70 125
             C 45 115, 25 95, 25 65
             C 25 55, 28 45, 33 37
             C 38 43, 44 48, 50 52
             C 48 56, 47 60, 47 65
             C 47 85, 60 102, 70 108
             C 70 114, 70 120, 70 125 Z" 
          fill="url(#silver-metal-2)" />

    <!-- 3. Blue Crystal Left Shell (Faceted Structure) -->
    <!-- Facet A (Top outer) -->
    <polygon points="70,15 55,20 33,37 50,52 70,40" fill="url(#blue-crystal-1)" opacity="0.9" />
    <!-- Facet B (Left outer) -->
    <polygon points="33,37 25,65 47,65 50,52" fill="url(#blue-crystal-2)" />
    <!-- Facet C (Left bottom) -->
    <polygon points="25,65 47,65 70,108 70,125" fill="url(#blue-crystal-1)" />
    
    <!-- Facet overlay lines for crystalline look -->
    <line x1="55" y1="20" x2="50" y2="52" stroke="#ffffff" stroke-width="0.7" opacity="0.4" />
    <line x1="70" y1="40" x2="50" y2="52" stroke="#ffffff" stroke-width="0.7" opacity="0.4" />
    <line x1="33" y1="37" x2="47" y2="65" stroke="#ffffff" stroke-width="0.7" opacity="0.4" />
    <line x1="47" y1="65" x2="70" y2="108" stroke="#ffffff" stroke-width="0.7" opacity="0.4" />

    <!-- 4. Central Geometric Cube 'Q' -->
    <!-- Q base box (Isometric Cube) -->
    <!-- Top Face -->
    <polygon points="70,42 82,49 70,56 58,49" fill="url(#silver-metal-1)" stroke="#475569" stroke-width="0.5" />
    <!-- Left Face -->
    <polygon points="58,49 70,56 70,72 58,65" fill="url(#silver-metal-2)" stroke="#475569" stroke-width="0.5" />
    <!-- Right Face -->
    <polygon points="70,56 82,49 82,65 70,72" fill="#E2E8F0" stroke="#475569" stroke-width="0.5" />

    <!-- Inside crystal blue core of the Q (representing the inner Q space) -->
    <polygon points="70,50 76,53 70,57 64,53" fill="url(#blue-glow)" />

    <!-- The Q crystalline swoop tail (flowing out down-right) -->
    <path d="M 70 65
             C 85 68, 110 82, 115 95
             C 105 92, 85 80, 70 72 Z"
          fill="url(#blue-crystal-1)" filter="url(#glow)" />
    <path d="M 70 65
             C 80 67, 100 78, 115 95
             C 108 90, 88 78, 70 72 Z"
          fill="#00F2FE" opacity="0.8" />
  </g>

  <!-- Typography Group (QUBEXE + Arabic) -->
  <g transform="translate(145, 10)">
    <!-- QUBEXE Main text -->
    <text x="0" y="65" 
          font-family="'Outfit', 'Inter', system-ui, sans-serif" 
          font-size="52" 
          font-weight="800" 
          letter-spacing="1.5"
          fill="url(#text-metal)"
          filter="url(#shadow)">QUBEXE</text>
    
    <!-- Arabic Subtitle "كيوبكس" (Metallic Silver) -->
    <text x="10" y="105" 
          font-family="system-ui, -apple-system, sans-serif" 
          font-size="28" 
          font-weight="700" 
          letter-spacing="2"
          fill="url(#text-metal)"
          opacity="0.9"
          filter="url(#shadow)">كيوبكس</text>
  </g>
</svg>
